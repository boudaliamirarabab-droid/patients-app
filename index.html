<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سجل المرضى</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#3b82f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="سجل المرضى">
<link rel="apple-touch-icon" href="./icon.svg">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1120;
  --surface:#111827;
  --card:#1a2235;
  --border:#1f2f4a;
  --accent:#3b82f6;
  --accent2:#06b6d4;
  --glow:rgba(59,130,246,0.18);
  --text:#e2e8f0;
  --muted:#64748b;
  --success:#10b981;
  --danger:#ef4444;
  --warning:#f59e0b;
  --r:14px
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Cairo','Tahoma',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;direction:rtl;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 10%,rgba(59,130,246,.07) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 90%,rgba(6,182,212,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{max-width:700px;margin:0 auto;padding:16px 14px 90px;position:relative;z-index:1}

/* ── sync bar ── */
#syncbar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 13px;margin-bottom:12px;font-size:.78rem;color:var(--muted)}
#syncbar .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
#syncbar.online .dot{background:var(--success)}
#syncbar.syncing .dot{background:var(--warning);animation:pulse 1s infinite}
#syncbar.offline .dot{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── lang bar ── */
.lang-bar{display:flex;gap:8px;margin-bottom:12px}
.lbtn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-family:'Cairo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .2s}
.lbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── install banner ── */
#ib{display:none;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;padding:12px 14px;margin-bottom:12px;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(59,130,246,.35)}
#ib.v{display:flex}
#ib span{flex:1;font-size:.84rem;font-weight:600;color:#fff}
.ibtn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:8px;padding:6px 12px;font-family:'Cairo',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer}
.xbtn{background:none;border:none;color:rgba(255,255,255,.7);font-size:1.1rem;cursor:pointer;padding:4px}

/* ── header ── */
header{text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.hico{width:50px;height:50px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px;box-shadow:0 0 28px rgba(59,130,246,.35)}
.hico svg{width:28px;height:28px;fill:#fff}
h1{font-size:1.55rem;font-weight:900;background:linear-gradient(135deg,#fff 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:var(--muted);font-size:.8rem;margin-top:4px}

/* ── bottom nav ── */
.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;padding:10px 4px 8px;border:none;background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s;position:relative}
.ticon{font-size:1.2rem}
.tab.on{color:var(--accent)}
.cbadge{background:var(--accent);color:#fff;border-radius:20px;padding:0 6px;font-size:.62rem;position:absolute;top:5px}

/* ── card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.ctitle{font-size:.95rem;font-weight:700;margin-bottom:15px;color:#fff;display:flex;align-items:center;gap:8px}
.ctitle span{color:var(--accent2)}

/* ── form grid ── */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:420px){.fgrid{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px;position:relative}
.fg.full{grid-column:1/-1}
label{font-size:.77rem;font-weight:600;color:var(--muted)}
.req{color:var(--danger);margin-right:2px}
input,textarea,select{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Cairo','Tahoma',sans-serif;font-size:.9rem;transition:border-color .2s,box-shadow .2s;direction:rtl;width:100%;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
textarea{min-height:72px;resize:vertical}
select option{background:var(--card);color:var(--text)}

/* blood group badge */
.blood-badge{display:inline-flex;align-items:center;justify-content:center;background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:3px 10px;font-size:.82rem;font-weight:700}

/* ── autocomplete ── */
.acw{position:relative}
.acl{position:absolute;top:100%;right:0;left:0;z-index:100;background:var(--card);border:1px solid var(--accent);border-radius:10px;max-height:170px;overflow-y:auto;margin-top:2px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none}
.aci{padding:9px 12px;cursor:pointer;font-size:.86rem;border-bottom:1px solid var(--border);transition:background .15s}
.aci:last-child{border-bottom:none}
.aci:hover,.aci:active{background:var(--border)}
.aci mark{background:rgba(59,130,246,.3);color:var(--accent2);border-radius:2px}

/* ── buttons ── */
.btn{padding:10px 18px;border:none;border-radius:10px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:700;transition:all .2s;touch-action:manipulation}
.bp{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 14px rgba(59,130,246,.3);width:100%}
.bp:active{transform:scale(.97)}
.bg{background:var(--surface);color:var(--muted);border:1px solid var(--border);width:100%}
.bd{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.2)}
.be{background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.2)}
.bs{background:rgba(16,185,129,.12);color:var(--success);border:1px solid rgba(16,185,129,.2)}
.bw{background:rgba(245,158,11,.12);color:var(--warning);border:1px solid rgba(245,158,11,.2)}
.sm{padding:6px 10px;font-size:.76rem;border-radius:8px}
.factions{display:flex;flex-direction:column;gap:9px;margin-top:15px}

/* ── toast ── */
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 20px;font-weight:600;font-size:.86rem;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:999;transition:transform .3s ease;white-space:nowrap;max-width:90vw;text-overflow:ellipsis;overflow:hidden}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{color:var(--success);border-color:rgba(16,185,129,.3)}
#toast.err{color:var(--danger);border-color:rgba(239,68,68,.3)}

/* ── stats ── */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.scard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.snum{font-size:1.55rem;font-weight:900;color:var(--accent)}
.slbl{font-size:.73rem;color:var(--muted);margin-top:3px}
.ystats{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.ypill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 13px;font-size:.8rem;display:flex;align-items:center;gap:6px}
.ypill strong{color:var(--accent2)}

/* ── search hint ── */
.shint{font-size:.77rem;color:var(--muted);margin-bottom:11px;display:flex;align-items:center;gap:5px}

/* ── patient card ── */
.pc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px}
.pch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.pcn{font-size:.95rem;font-weight:700;color:#fff}
.pcf{font-size:.77rem;color:var(--accent2);font-weight:700;margin-top:2px}
.pca{display:flex;gap:6px;flex-shrink:0}
.pci{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pf{font-size:.77rem}
.pl{color:var(--muted);margin-bottom:1px}
.pv{color:var(--text);font-weight:600}
.pfu{grid-column:1/-1}
.bdg{display:inline-block;background:rgba(6,182,212,.1);color:var(--accent2);border:1px solid rgba(6,182,212,.2);border-radius:8px;padding:3px 9px;font-size:.79rem;word-break:break-word}

/* ── backup grid ── */
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:420px){.bgrid{grid-template-columns:1fr}}

/* ── empty state ── */
.empty{text-align:center;padding:44px 20px;color:var(--muted)}
.empty .ico{font-size:2.2rem;margin-bottom:8px}
.empty p{font-size:.86rem}

/* ── sections ── */
.sec{display:none}
.sec.on{display:block}

/* ── modal ── */
.mover{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.mover.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px 18px;width:100%;max-width:700px;max-height:92vh;overflow-y:auto;padding-bottom:calc(22px + env(safe-area-inset-bottom))}
.mhandle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.mtitle{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:15px}

/* ── highlight ── */
mark{background:rgba(59,130,246,.3);color:var(--accent2);border-radius:3px;padding:0 1px}
</style>
</head>
<body>
<div class="wrap">

<!-- sync bar -->
<div id="syncbar" class="offline">
  <div class="dot"></div>
  <span id="syncmsg">جاري الاتصال...</span>
</div>

<!-- lang -->
<div class="lang-bar">
  <button class="lbtn on" id="bar" onclick="setLang('ar')">🇩🇿 عربي</button>
  <button class="lbtn" id="bfr" onclick="setLang('fr')">🇫🇷 Français</button>
</div>

<!-- install banner -->
<div id="ib">
  <span id="imsg">📲 ثبّت التطبيق على هاتفك</span>
  <button class="ibtn" id="bic">تثبيت</button>
  <button class="xbtn" id="bdx">✕</button>
</div>

<!-- header -->
<header>
  <div class="hico">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 3a1 1 0 011 1v2h2a1 1 0 110 2h-2v2a1 1 0 11-2 0v-2H9a1 1 0 110-2h2V7a1 1 0 011-1zm-5 9a1 1 0 011-1h8a1 1 0 110 2H8a1 1 0 01-1-1z"/>
    </svg>
  </div>
  <h1 id="htitle">سجل المرضى</h1>
  <p class="sub" id="hsub">يعمل بدون إنترنت ✓</p>
</header>

<!-- ═══ ADD ═══ -->
<div class="sec on" id="s-add">
<div class="card">
  <div class="ctitle"><span>👤</span><span data-t="add_title">إضافة مريض جديد</span></div>
  <div class="fgrid">

    <div class="fg full">
      <label><span class="req">*</span><span data-t="lbl_file">رقم الملف</span> <small style="color:var(--muted);font-weight:400">(73/25)</small></label>
      <div class="acw"><input id="ff" type="text" placeholder="73/25" autocomplete="off" oninput="aci(this,'ff')"><div class="acl" id="al-ff"></div></div>
    </div>

    <div class="fg">
      <label><span class="req">*</span><span data-t="lbl_prenom">الاسم</span></label>
      <div class="acw"><input id="fp" type="text" placeholder="أحمد" autocomplete="off" oninput="aci(this,'fp')"><div class="acl" id="al-fp"></div></div>
    </div>
    <div class="fg">
      <label data-t="lbl_nom">اللقب</label>
      <div class="acw"><input id="fn" type="text" placeholder="بن علي" autocomplete="off" oninput="aci(this,'fn')"><div class="acl" id="al-fn"></div></div>
    </div>
    <div class="fg">
      <label data-t="lbl_phone">رقم الهاتف</label>
      <div class="acw"><input id="fh" type="tel" placeholder="0555 000 000" oninput="aci(this,'fh')"><div class="acl" id="al-fh"></div></div>
    </div>
    <div class="fg">
      <label data-t="lbl_dob">تاريخ الميلاد</label>
      <input id="fd" type="date">
    </div>
    <div class="fg">
      <label data-t="lbl_blood">زمرة الدم</label>
      <select id="fb">
        <option value="">— اختر —</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
      </select>
    </div>
    <div class="fg full">
      <label data-t="lbl_address">مكان السكن</label>
      <div class="acw"><input id="fa" type="text" placeholder="الولاية / البلدية" autocomplete="off" oninput="aci(this,'fa')"><div class="acl" id="al-fa"></div></div>
    </div>
    <div class="fg full">
      <label data-t="lbl_diag">التشخيص</label>
      <div class="acw"><textarea id="fg" placeholder="اكتب التشخيص..." oninput="aci(this,'fg')"></textarea><div class="acl" id="al-fg"></div></div>
    </div>

  </div>
  <div class="factions">
    <button class="btn bp" onclick="addP()">💾 <span data-t="btn_save">حفظ المريض</span></button>
    <button class="btn bg" onclick="clrF()">🔄 <span data-t="btn_clear">مسح الحقول</span></button>
  </div>
</div>
</div>

<!-- ═══ SEARCH ═══ -->
<div class="sec" id="s-search">
  <div class="sgrid" id="sgrid"></div>
  <div class="ystats" id="ys"></div>
  <div class="card">
    <div class="ctitle"><span>🔍</span><span data-t="search_title">البحث الفوري</span></div>
    <p class="shint">💡 <span data-t="search_hint">ابحث بأي حقل أو بعدة حقول في نفس الوقت</span></p>
    <div class="fgrid">
      <div class="fg"><label data-t="lbl_file">رقم الملف</label><input id="sf" oninput="doSearch()" placeholder="73/25"></div>
      <div class="fg"><label data-t="lbl_prenom">الاسم</label><input id="sp" oninput="doSearch()" placeholder="..."></div>
      <div class="fg"><label data-t="lbl_nom">اللقب</label><input id="sn" oninput="doSearch()" placeholder="..."></div>
      <div class="fg"><label data-t="lbl_phone">الهاتف</label><input id="sh" type="tel" oninput="doSearch()" placeholder="..."></div>
      <div class="fg"><label data-t="lbl_address">مكان السكن</label><input id="sa" oninput="doSearch()" placeholder="..."></div>
      <div class="fg"><label data-t="lbl_diag">التشخيص</label><input id="sg" oninput="doSearch()" placeholder="..."></div>
      <div class="fg"><label data-t="lbl_dob">تاريخ الميلاد</label><input id="sd" type="date" oninput="doSearch()"></div>
      <div class="fg">
        <label data-t="lbl_blood">زمرة الدم</label>
        <select id="sb" onchange="doSearch()">
          <option value="">— الكل —</option>
          <option value="A+">A+</option>
          <option value="A-">A-</option>
          <option value="B+">B+</option>
          <option value="B-">B-</option>
          <option value="AB+">AB+</option>
          <option value="AB-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>
      </div>
      <div class="fg full" style="justify-content:flex-end;margin-top:4px">
        <button class="btn bg sm" onclick="clrS()">🗑️ <span data-t="btn_clear_search">مسح</span></button>
      </div>
    </div>
    <div style="margin-top:9px;font-size:.8rem;color:var(--muted)"><span data-t="results_label">النتائج:</span> <strong id="rc" style="color:var(--text)">0</strong></div>
  </div>
  <div id="plist"></div>
</div>

<!-- ═══ BACKUP ═══ -->
<div class="sec" id="s-backup">
  <div class="card">
    <div class="ctitle"><span>📤</span><span data-t="export_title">تصدير البيانات</span></div>
    <div class="bgrid">
      <button class="btn bs" onclick="expPDF()">📄 <span data-t="btn_pdf">تصدير PDF</span></button>
      <button class="btn bw" onclick="expBak()">💾 <span data-t="btn_backup">نسخة احتياطية</span></button>
    </div>
  </div>
  <div class="card">
    <div class="ctitle"><span>📥</span><span data-t="import_title">استرجاع البيانات</span></div>
    <p style="font-size:.8rem;color:var(--muted);margin-bottom:13px" data-t="import_hint">اختاري ملف النسخة الاحتياطية (.json)</p>
    <input type="file" id="ifile" accept=".json" style="display:none" onchange="impBak(event)">
    <button class="btn bg" onclick="document.getElementById('ifile').click()">📂 <span data-t="btn_import">استيراد ملف</span></button>
    <p style="font-size:.76rem;color:var(--danger);margin-top:9px" data-t="import_warn">⚠️ سيضاف المرضى الجدد إلى القائمة الحالية</p>
  </div>
</div>

</div><!-- /wrap -->

<!-- NAV -->
<nav class="tabs">
  <button class="tab on" id="t-add" onclick="switchTab('add')"><span class="ticon">➕</span><span data-t="tab_add">إضافة</span></button>
  <button class="tab" id="t-search" onclick="switchTab('search')"><span class="ticon">🔍</span><span data-t="tab_search">البحث</span><span class="cbadge" id="cbadge">0</span></button>
  <button class="tab" id="t-backup" onclick="switchTab('backup')"><span class="ticon">📦</span><span data-t="tab_backup">النسخ</span></button>
</nav>

<!-- EDIT MODAL -->
<div class="mover" id="emod">
  <div class="modal">
    <div class="mhandle"></div>
    <div class="mtitle" data-t="edit_title">✏️ تعديل بيانات المريض</div>
    <div class="fgrid">
      <div class="fg full"><label data-t="lbl_file">رقم الملف</label><input id="ef" type="text" placeholder="73/25"></div>
      <div class="fg"><label data-t="lbl_prenom">الاسم</label><input id="ep" type="text"></div>
      <div class="fg"><label data-t="lbl_nom">اللقب</label><input id="en" type="text"></div>
      <div class="fg"><label data-t="lbl_phone">الهاتف</label><input id="eh" type="tel"></div>
      <div class="fg"><label data-t="lbl_dob">تاريخ الميلاد</label><input id="ed" type="date"></div>
      <div class="fg">
        <label data-t="lbl_blood">زمرة الدم</label>
        <select id="eb">
          <option value="">— اختر —</option>
          <option value="A+">A+</option>
          <option value="A-">A-</option>
          <option value="B+">B+</option>
          <option value="B-">B-</option>
          <option value="AB+">AB+</option>
          <option value="AB-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>
      </div>
      <div class="fg full"><label data-t="lbl_address">مكان السكن</label><input id="ea" type="text"></div>
      <div class="fg full"><label data-t="lbl_diag">التشخيص</label><textarea id="eg"></textarea></div>
    </div>
    <div class="factions" style="margin-top:13px">
      <button class="btn bp" onclick="saveEdit()">💾 <span data-t="btn_save_edit">حفظ التعديلات</span></button>
      <button class="btn bg" onclick="closeM()"><span data-t="btn_cancel">إلغاء</span></button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

// ── حالة الاتصال ──────────────────────────────────────────────
function setSyncState(state, msg){
  const bar = document.getElementById('syncbar');
  const txt = document.getElementById('syncmsg');
  bar.className = state;
  txt.textContent = msg;
}

// ── كاش محلي + Firebase ──────────────────────────────────────
const KEY = 'patients_db';
const loadLocal = () => { try{ return JSON.parse(localStorage.getItem(KEY))||[]; }catch{ return[]; } };
const saveLocal = d => localStorage.setItem(KEY, JSON.stringify(d));

// نستمع لـ Firestore real-time
setSyncState('syncing', window._T ? window._T('sync_connecting') : 'جاري الاتصال...');

const q = query(collection(db, COL), orderBy('createdAt','desc'));
onSnapshot(q,
  snap => {
    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    saveLocal(data);
    window._fbReady = true;
    setSyncState('online', window._T ? window._T('sync_online') : '🟢 متصل — البيانات محدّثة');
    window.updBadge();
    if(document.getElementById('s-search').classList.contains('on')){
      window.doSearch();
      window.renderStats();
    }
  },
  err => {
    console.warn('Firestore offline:', err);
    setSyncState('offline', window._T ? window._T('sync_offline') : '🔴 غير متصل — يعمل محلياً');
  }
);

// ── عمليات Firestore ──────────────────────────────────────────
window._fbAdd = async (patient) => {
  setSyncState('syncing', '⏳ جاري الحفظ...');
  const { id, ...data } = patient;
  await setDoc(doc(db, COL, id), data);
};

window._fbUpdate = async (id, patient) => {
  setSyncState('syncing', '⏳ جاري التحديث...');
  const { id: _id, ...data } = patient;
  await updateDoc(doc(db, COL, id), data);
};

window._fbDelete = async (id) => {
  setSyncState('syncing', '⏳ جاري الحذف...');
  await deleteDoc(doc(db, COL, id));
};

window._fbImport = async (patients) => {
  setSyncState('syncing', '⏳ جاري الاستيراد...');
  for(const p of patients){
    const { id, ...data } = p;
    await setDoc(doc(db, COL, id), data);
  }
};
</script>

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=(type==='ok'?'✅ ':'❌ ')+msg;
  el.className='show '+type;
  setTimeout(()=>{el.className='';},1500);
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('t-'+tab).classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-'+tab).classList.add('on');
  document.querySelectorAll('.acl').forEach(el=>el.style.display='none');
  if(tab==='search'){doSearch();renderStats();}
}

// ── AUTOCOMPLETE ──────────────────────────────────────────────
const FMAP={ff:'fileNum',fp:'prenom',fn:'nom',fh:'phone',fa:'address',fg:'diag'};

function getVals(field){
  const s=new Set();
  load().forEach(p=>{const v=(p[field]||'').trim();if(v)s.add(v);});
  return[...s];
}

function aci(inp,fid){
  const q=inp.value.trim().toLowerCase();
  const lel=document.getElementById('al-'+fid);
  if(!lel)return;
  if(!q){lel.style.display='none';return;}
  const field=FMAP[fid];
  const vals=getVals(field);
  const hits=vals.filter(v=>v.toLowerCase().includes(q)&&v.toLowerCase()!==q).slice(0,8);
  if(!hits.length){lel.style.display='none';return;}
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  lel.innerHTML=hits.map(v=>`<div class="aci" onmousedown="acSel('${fid}','${v.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}',event)">${v.replace(re,'<mark>$1</mark>')}</div>`).join('');
  lel.style.display='block';
}

function acSel(fid,val,e){
  e.preventDefault();
  const inp=document.getElementById(fid)||document.getElementById('e'+fid.slice(1));
  if(inp) inp.value=val;
  const lel=document.getElementById('al-'+fid);
  if(lel) lel.style.display='none';
}

document.addEventListener('click',e=>{
  if(!e.target.closest('.acw')) document.querySelectorAll('.acl').forEach(el=>el.style.display='none');

// ── ADD ───────────────────────────────────────────────────────
async function addP(){
  const fileNum = document.getElementById('ff').value.trim();
  const prenom  = document.getElementById('fp').value.trim();
  const nom     = document.getElementById('fn').value.trim();
  const phone   = document.getElementById('fh').value.trim();
  const dob     = document.getElementById('fd').value;
  const blood   = document.getElementById('fb').value;
  const address = document.getElementById('fa').value.trim();
  const diag    = document.getElementById('fg').value.trim();
  if(!fileNum||!prenom){toast(t('toast_req'),'err');return;}
  const patient = {id:uid(),fileNum,prenom,nom,phone,dob,blood,address,diag,createdAt:new Date().toISOString()};
  try{
    await window._fbAdd(patient);
    clrF();
    switchTab('search');
    toast(t('toast_saved'));
  }catch(e){
    // فشل Firebase — نحفظ محلياً
    const data=load();
    data.unshift(patient);
    localStorage.setItem(KEY,JSON.stringify(data));
    updBadge();clrF();switchTab('search');
    toast(t('toast_saved'));
  }
}

function clrF(){
  ['ff','fp','fn','fh','fd','fa','fg'].forEach(id=>{
    const e=document.getElementById(id);if(e)e.value='';
  });
  document.getElementById('fb').value='';
}

// ── DELETE ────────────────────────────────────────────────────
async function delP(id){
  if(!confirm(t('conf_del')))return;
  try{
    await window._fbDelete(id);
    toast(t('toast_deleted'));
  }catch{
    const data=load().filter(p=>p.id!==id);
    localStorage.setItem(KEY,JSON.stringify(data));
    updBadge();doSearch();renderStats();
    toast(t('toast_deleted'));
  }
}

// ── EDIT ──────────────────────────────────────────────────────
let eid=null;
function openEdit(id){
  const p=load().find(x=>x.id===id);if(!p)return;
  eid=id;
  document.getElementById('ef').value=p.fileNum||'';
  document.getElementById('ep').value=p.prenom||'';
  document.getElementById('en').value=p.nom||'';
  document.getElementById('eh').value=p.phone||'';
  document.getElementById('ed').value=p.dob||'';
  document.getElementById('eb').value=p.blood||'';
  document.getElementById('ea').value=p.address||'';
  document.getElementById('eg').value=p.diag||'';
  document.getElementById('emod').classList.add('open');
}
function closeM(){document.getElementById('emod').classList.remove('open');eid=null;}

async function saveEdit(){
  if(!eid)return;
  const patient={
    id:eid,
    fileNum : document.getElementById('ef').value.trim(),
    prenom  : document.getElementById('ep').value.trim(),
    nom     : document.getElementById('en').value.trim(),
    phone   : document.getElementById('eh').value.trim(),
    dob     : document.getElementById('ed').value,
    blood   : document.getElementById('eb').value,
    address : document.getElementById('ea').value.trim(),
    diag    : document.getElementById('eg').value.trim(),
  };
  try{
    await window._fbUpdate(eid, patient);
    closeM();
    toast(t('toast_updated'));
  }catch{
    const data=load();
    const i=data.findIndex(x=>x.id===eid);
    if(i>-1){Object.assign(data[i],patient);localStorage.setItem(KEY,JSON.stringify(data));}
    closeM();updBadge();doSearch();renderStats();
    toast(t('toast_updated'));
  }
}
document.getElementById('emod').addEventListener('click',function(e){if(e.target===this)closeM();});
