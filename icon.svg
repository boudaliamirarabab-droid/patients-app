<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- خلفية -->
  <rect width="512" height="512" rx="100" fill="#0b1120"/>
  <!-- gradient للبطاقة -->
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- بطاقة المستشفى -->
  <rect x="96" y="96" width="320" height="320" rx="48" fill="url(#g1)"/>
  <!-- علامة + (صليب طبي) -->
  <!-- العمود الأفقي -->
  <rect x="160" y="230" width="192" height="52" rx="16" fill="#ffffff"/>
  <!-- العمود العمودي -->
  <rect x="230" y="160" width="52" height="192" rx="16" fill="#ffffff"/>
</svg>
